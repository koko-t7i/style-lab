<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>__PRODUCT_TITLE__ — style-lab</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #fafaf7;
    --surface: #ffffff;
    --border: #ebe9e3;
    --border-strong: #c8c5bf;
    --text: #18181b;
    --text-dim: #6b6b73;
    --text-faint: #9a9aa3;
    --accent: #18181b;
    --pick: #2563eb;
    --pick-soft: #eff4ff;
    --sidebar-w: 240px;
  }

  html { scroll-behavior: smooth; }
  html, body { height: 100%; }

  body {
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overflow: hidden;
  }

  .app {
    display: grid;
    grid-template-columns: var(--sidebar-w) 1fr;
    height: 100vh;
  }

  /* SIDEBAR */
  aside {
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .brand {
    padding: 22px 24px 18px;
    border-bottom: 1px solid var(--border);
  }

  .wordmark {
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--text);
  }

  .product {
    margin-top: 6px;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-dim);
    letter-spacing: -0.005em;
  }

  .toc {
    flex: 1;
    overflow-y: auto;
    padding: 16px 0;
  }

  .toc-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.18em;
    color: var(--text-faint);
    text-transform: uppercase;
    padding: 0 24px 10px;
  }

  .toc-item {
    display: flex;
    align-items: baseline;
    gap: 12px;
    padding: 10px 24px;
    color: var(--text-dim);
    text-decoration: none;
    border-left: 2px solid transparent;
    transition: all 120ms;
    cursor: pointer;
    font-family: inherit;
    background: transparent;
    border-top: none;
    border-right: none;
    border-bottom: none;
    width: 100%;
    text-align: left;
  }

  .toc-item:hover {
    color: var(--text);
    background: rgba(0,0,0,0.02);
  }

  .toc-item.active {
    color: var(--text);
    border-left-color: var(--accent);
    background: rgba(0,0,0,0.03);
  }

  .toc-num {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.15em;
    color: var(--text-faint);
    font-variant-numeric: tabular-nums;
    flex-shrink: 0;
  }

  .toc-item.active .toc-num { color: var(--text); }

  .toc-name {
    font-size: 13px;
    font-weight: 500;
    letter-spacing: -0.005em;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .toc-item.active .toc-name { font-weight: 600; }

  .toc-pick {
    margin-left: auto;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--pick);
    background: var(--pick-soft);
    padding: 2px 6px;
    border-radius: 3px;
    flex-shrink: 0;
  }

  .toc-item.picked { background: rgba(37, 99, 235, 0.04); }
  .toc-item.picked .toc-name { color: var(--text); }

  .picks-notes {
    margin: 4px 16px 14px;
    padding: 10px 12px;
    background: var(--pick-soft);
    border-left: 2px solid var(--pick);
    border-radius: 4px;
    font-size: 11px;
    color: var(--text-dim);
    line-height: 1.45;
  }

  .picks-notes .picks-label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.18em;
    color: var(--pick);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .picks-notes ul { list-style: none; padding: 0; margin: 0; }
  .picks-notes li + li { margin-top: 4px; }

  .controls {
    border-top: 1px solid var(--border);
    padding: 14px 20px 18px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .control-label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.2em;
    color: var(--text-faint);
    text-transform: uppercase;
  }

  .viewport-switcher {
    display: flex;
    gap: 2px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 2px;
  }

  .viewport-switcher button {
    flex: 1;
    background: transparent;
    border: none;
    padding: 6px 4px;
    border-radius: 5px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.05em;
    color: var(--text-dim);
    cursor: pointer;
    font-family: inherit;
    transition: all 150ms;
  }

  .viewport-switcher button:hover { color: var(--text); }
  .viewport-switcher button.active { background: var(--accent); color: white; }

  .keyhint {
    font-size: 10px;
    color: var(--text-faint);
    line-height: 1.5;
    margin-top: 2px;
  }
  .keyhint kbd {
    display: inline-block;
    padding: 1px 5px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-bottom-width: 2px;
    border-radius: 3px;
    font-family: inherit;
    font-size: 9px;
    margin: 0 1px;
  }

  /* MAIN */
  main {
    overflow-y: auto;
    overflow-x: hidden;
    background: var(--bg);
    scroll-behavior: smooth;
  }

  .variant-section {
    padding: 24px 32px 32px;
  }

  .variant-section + .variant-section {
    border-top: 1px dashed var(--border-strong);
  }

  .variant-header {
    display: flex;
    flex-wrap: wrap;
    justify-content: space-between;
    align-items: baseline;
    padding: 0 4px 16px;
  }

  /* title (col 1) and actions (col 2) keep the original baseline row;
     the optional intent caption drops to a full-width line under them */
  .variant-header .variant-title { flex: 0 1 auto; order: 1; }
  .variant-header .variant-actions { flex: 0 0 auto; order: 2; }
  .variant-header .variant-intent {
    order: 3;
    flex: 1 0 100%;
  }

  .variant-title {
    display: flex;
    align-items: baseline;
    gap: 14px;
  }

  .variant-intent {
    font-size: 12px;
    color: var(--text-dim);
    font-weight: 400;
    letter-spacing: -0.005em;
    margin-top: 6px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    min-width: 0;
  }

  .variant-num {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.18em;
    color: var(--text-dim);
    font-variant-numeric: tabular-nums;
  }

  .variant-name {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -0.02em;
  }

  .pick-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--surface);
    background: var(--pick);
    padding: 4px 9px;
    border-radius: 4px;
    line-height: 1;
  }

  .variant-section.picked .variant-frame {
    box-shadow: 0 0 0 2px var(--pick), 0 12px 40px rgba(37, 99, 235, 0.12);
  }

  .variant-actions {
    display: flex;
    gap: 8px;
  }

  .variant-actions a {
    color: var(--text-dim);
    font-size: 11px;
    font-weight: 500;
    text-decoration: none;
    padding: 6px 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    transition: all 150ms;
    background: var(--surface);
  }

  .variant-actions a:hover {
    color: var(--text);
    border-color: var(--text);
  }

  /* pick / link buttons: peers of .variant-actions a (same metrics) */
  .variant-actions .act-pick,
  .variant-actions .act-link {
    font-family: inherit;
    font-size: 11px;
    font-weight: 500;
    padding: 6px 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--surface);
    color: var(--text-dim);
    cursor: pointer;
    transition: all 150ms;
    line-height: 1.45;
  }

  /* secondary, like the existing Open link */
  .variant-actions .act-link:hover {
    color: var(--text);
    border-color: var(--text);
  }

  /* primary affordance — the pick accent */
  .variant-actions .act-pick {
    color: var(--pick);
    border-color: var(--pick);
    background: var(--pick-soft);
    font-weight: 600;
  }

  .variant-actions .act-pick:hover {
    color: var(--surface);
    background: var(--pick);
    border-color: var(--pick);
  }

  .variant-actions .act-pick:active,
  .variant-actions .act-link:active { transform: translateY(1px); }

  .variant-frame {
    height: calc(100vh - 110px);
    min-height: 600px;
    background: white;
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 1px 2px rgba(0,0,0,0.03), 0 12px 40px rgba(0,0,0,0.05);
    display: flex;
    justify-content: center;
  }

  .variant-frame iframe {
    display: block;
    width: 100%;
    height: 100%;
    border: none;
    transition: width 200ms ease;
  }

  body.viewport-tablet .variant-frame iframe { width: 768px; max-width: 100%; }
  body.viewport-mobile .variant-frame iframe { width: 390px; max-width: 100%; }

  /* per-variant scratchpad note */
  .variant-notes {
    padding: 14px 4px 0;
  }

  .note-input {
    display: block;
    width: 100%;
    font-family: inherit;
    font-size: 12px;
    line-height: 1.5;
    color: var(--text);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 11px;
    resize: vertical;
    min-height: 52px;
    transition: border-color 150ms;
  }

  .note-input::placeholder { color: var(--text-faint); }

  .note-input:focus {
    outline: none;
    border-color: var(--border-strong);
  }

  /* copy-all-feedback button in the sidebar .controls block */
  #copy-feedback {
    font-family: inherit;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.02em;
    color: var(--pick);
    background: var(--pick-soft);
    border: 1px solid var(--pick);
    border-radius: 7px;
    padding: 8px 10px;
    cursor: pointer;
    transition: all 150ms;
  }

  #copy-feedback:hover {
    color: var(--surface);
    background: var(--pick);
  }

  #copy-feedback:active { transform: translateY(1px); }

  /* toast */
  #toast {
    position: fixed;
    left: 50%;
    bottom: 26px;
    transform: translateX(-50%) translateY(8px);
    background: var(--text);
    color: var(--surface);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: -0.005em;
    padding: 10px 18px;
    border-radius: 8px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.18);
    opacity: 0;
    pointer-events: none;
    transition: opacity 180ms ease, transform 180ms ease;
    z-index: 1000;
    max-width: 80vw;
    text-align: center;
  }

  #toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* onboarding hint bar — slim overlay pinned to top of main column */
  #hint-bar {
    position: fixed;
    top: 0;
    left: var(--sidebar-w);
    right: 0;
    z-index: 900;
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--pick-soft);
    border-bottom: 1px solid var(--border);
    color: var(--text-dim);
    font-size: 11px;
    line-height: 1.4;
    padding: 7px 16px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  #hint-bar .hint-text {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  #hint-dismiss {
    flex-shrink: 0;
    font-family: inherit;
    font-size: 14px;
    line-height: 1;
    color: var(--text-dim);
    background: transparent;
    border: none;
    cursor: pointer;
    padding: 2px 6px;
    border-radius: 4px;
    transition: all 150ms;
  }

  #hint-dismiss:hover { color: var(--text); background: rgba(0,0,0,0.05); }

  /* when hint is showing, push the main scroll content down so the
     first variant is never permanently covered */
  body.hint-on main { padding-top: 32px; }

  .empty-state {
    grid-column: 1 / -1;
    text-align: center;
    color: var(--text-dim);
    padding: 80px 20px;
  }
  .empty-state h2 { color: var(--text); margin-bottom: 12px; font-size: 20px; }

  /* Scrollbar polish */
  main::-webkit-scrollbar, .toc::-webkit-scrollbar { width: 8px; }
  main::-webkit-scrollbar-track, .toc::-webkit-scrollbar-track { background: transparent; }
  main::-webkit-scrollbar-thumb, .toc::-webkit-scrollbar-thumb {
    background: var(--border-strong);
    border-radius: 4px;
  }

  /* Mobile fallback: stack sidebar on top */
  @media (max-width: 760px) {
    .app { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
    aside { border-right: none; border-bottom: 1px solid var(--border); max-height: 38vh; }
    .toc { display: flex; flex-wrap: wrap; padding: 8px; gap: 4px; }
    .toc-label { display: none; }
    .toc-item { width: auto; padding: 6px 10px; border: 1px solid var(--border); border-radius: 6px; border-left-width: 1px; }
    .toc-item.active { border-color: var(--accent); border-left-width: 1px; }
    .controls { display: none; }
    .variant-section { padding: 18px; }
    /* sidebar stacks on top → hint bar spans full width */
    #hint-bar { left: 0; }
    .variant-header { flex-direction: column; align-items: flex-start; gap: 8px; }
    .variant-header .variant-actions { flex-wrap: wrap; }
    .variant-header .variant-intent { flex-basis: auto; white-space: normal; }
  }
</style>
</head>
<body>
<div id="hint-bar" hidden>
  <span class="hint-text">Scroll or press 1–N to flip through · on a variant, click "✓ Pick this" to copy a selection phrase and paste it back in chat to lock it in · jot reactions in the notes below and grab them all with "Copy all feedback"</span>
  <button id="hint-dismiss" type="button" aria-label="dismiss">×</button>
</div>
<div class="app">
  __APP_BODY__
</div>
<div id="toast" role="status" aria-live="polite"></div>
<script>
  const variants = __VARIANTS_JSON__;

  // --- reusable toast ---
  let toastTimer = null;
  function showToast(msg) {
    const el = document.getElementById('toast');
    if (!el) return;
    el.textContent = msg;
    el.classList.add('show');
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
  }

  // --- clipboard with file:// / non-secure fallback ---
  function copyText(text) {
    if (navigator.clipboard && window.isSecureContext) {
      return navigator.clipboard.writeText(text).catch(() => legacyCopy(text));
    }
    return Promise.resolve(legacyCopy(text));
  }
  function legacyCopy(text) {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.setAttribute('readonly', '');
    ta.style.position = 'fixed';
    ta.style.top = '-9999px';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    let ok = false;
    try { ok = document.execCommand('copy'); } catch (e) { ok = false; }
    document.body.removeChild(ta);
    return ok;
  }

  // --- onboarding hint bar ---
  (function () {
    const bar = document.getElementById('hint-bar');
    if (!bar) return;
    if (localStorage.getItem('style-lab:hint-dismissed') === '1') return;
    bar.hidden = false;
    document.body.classList.add('hint-on');
    const dismiss = () => {
      try { localStorage.setItem('style-lab:hint-dismissed', '1'); } catch (e) {}
      bar.remove();
      document.body.classList.remove('hint-on');
    };
    const btn = document.getElementById('hint-dismiss');
    if (btn) btn.addEventListener('click', dismiss);
  })();

  if (variants.length) {
    const tocItems = document.querySelectorAll('.toc-item');
    const sections = document.querySelectorAll('.variant-section');
    const main = document.getElementById('main');

    // toc click → scroll to section
    tocItems.forEach((item, i) => {
      item.addEventListener('click', () => {
        sections[i].scrollIntoView({ behavior: 'smooth', block: 'start' });
      });
    });

    // intersection observer → highlight active toc item as user scrolls
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const idx = parseInt(entry.target.dataset.idx);
          tocItems.forEach((t, i) => t.classList.toggle('active', i === idx));
        }
      });
    }, { root: main, rootMargin: '-30% 0px -60% 0px', threshold: 0 });

    sections.forEach(s => observer.observe(s));
    tocItems[0].classList.add('active');

    // viewport switcher
    document.querySelectorAll('#viewport-switcher button').forEach(btn => {
      btn.onclick = () => {
        document.querySelectorAll('#viewport-switcher button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.body.classList.remove('viewport-tablet', 'viewport-mobile');
        const v = btn.dataset.viewport;
        if (v === 'tablet') document.body.classList.add('viewport-tablet');
        if (v === 'mobile') document.body.classList.add('viewport-mobile');
      };
    });

    // keyboard nav
    document.addEventListener('keydown', e => {
      if (e.target && (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA')) return;
      const activeIdx = Array.from(tocItems).findIndex(t => t.classList.contains('active'));
      let next = activeIdx;
      if (e.key === 'ArrowDown' || e.key === 'j') next = Math.min(activeIdx + 1, sections.length - 1);
      else if (e.key === 'ArrowUp' || e.key === 'k') next = Math.max(activeIdx - 1, 0);
      else if (e.key >= '1' && e.key <= '9') next = Math.min(parseInt(e.key) - 1, sections.length - 1);
      else return;
      e.preventDefault();
      sections[next].scrollIntoView({ behavior: 'smooth', block: 'start' });
    });

    // pick → copy pasteback phrase
    document.querySelectorAll('.act-pick').forEach(btn => {
      btn.addEventListener('click', () => {
        Promise.resolve(copyText(btn.dataset.pasteback || ''))
          .then(() => showToast('Selection phrase copied — paste it back in chat to lock this one'));
      });
    });

    // link → copy direct url
    document.querySelectorAll('.act-link').forEach(btn => {
      btn.addEventListener('click', () => {
        Promise.resolve(copyText(btn.dataset.url || ''))
          .then(() => showToast('Link copied — open this variant on your phone or another device'));
      });
    });

    // notes persistence (localStorage, debounced) + restore
    const NOTES_KEY = 'style-lab:notes:' + location.pathname;
    const noteInputs = document.querySelectorAll('.note-input');
    let savedNotes = {};
    try { savedNotes = JSON.parse(localStorage.getItem(NOTES_KEY) || '{}') || {}; } catch (e) { savedNotes = {}; }
    noteInputs.forEach(ta => {
      const idx = ta.dataset.idx;
      if (Object.prototype.hasOwnProperty.call(savedNotes, idx)) ta.value = savedNotes[idx];
    });
    let saveTimer = null;
    function persistNotes() {
      const map = {};
      noteInputs.forEach(ta => {
        const v = ta.value;
        if (v && v.trim()) map[ta.dataset.idx] = v;
      });
      try { localStorage.setItem(NOTES_KEY, JSON.stringify(map)); } catch (e) {}
    }
    noteInputs.forEach(ta => {
      ta.addEventListener('input', () => {
        if (saveTimer) clearTimeout(saveTimer);
        saveTimer = setTimeout(persistNotes, 400);
      });
    });

    // copy-all-feedback
    const copyFeedbackBtn = document.getElementById('copy-feedback');
    if (copyFeedbackBtn) {
      copyFeedbackBtn.addEventListener('click', () => {
        const byIdx = {};
        variants.forEach(v => { byIdx[v.idx] = v; });
        const lines = [];
        noteInputs.forEach(ta => {
          const note = (ta.value || '').trim();
          if (!note) return;
          const v = byIdx[parseInt(ta.dataset.idx, 10)];
          const num = v ? v.num : ta.dataset.idx;
          const name = v ? v.name : '';
          lines.push('#' + num + ' ' + name + ': ' + note);
        });
        if (!lines.length) { showToast('No notes written yet'); return; }
        const header = (document.title.split(' — ')[0] || 'style-lab') + ' — design feedback';
        const block = header + '\n\n' + lines.join('\n');
        Promise.resolve(copyText(block))
          .then(() => showToast('All feedback copied (' + lines.length + ' item' + (lines.length === 1 ? '' : 's') + ')'));
      });
    }
  }
</script>
</body>
</html>
